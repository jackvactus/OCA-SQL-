<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="oracleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Database cylinder -->
  <g>
    <!-- Top ellipse -->
    <ellipse cx="80" cy="50" rx="35" ry="12" fill="url(#oracleGrad)" opacity="0.9"/>
    <ellipse cx="80" cy="48" rx="35" ry="12" fill="#ef4444"/>
    
    <!-- Main cylinder body -->
    <rect x="45" y="50" width="70" height="50" fill="#dc2626"/>
    
    <!-- Bottom ellipse -->
    <ellipse cx="80" cy="100" rx="35" ry="12" fill="#991b1b"/>
    
    <!-- Highlight stripe on cylinder -->
    <rect x="45" y="55" width="70" height="4" fill="#fca5a5" opacity="0.6"/>
    <rect x="45" y="70" width="70" height="3" fill="#fca5a5" opacity="0.4"/>
  </g>
  
  <!-- SQL tag -->
  <g>
    <rect x="95" y="75" width="50" height="28" rx="6" fill="white" stroke="#ef4444" stroke-width="2"/>
    <text x="120" y="94" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef4444">SQL</text>
  </g>
</svg>
