<svg width="512" height="256" viewBox="0 0 512 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Red top bar -->
  <rect width="512" height="12" fill="#ED1C24"/>
  
  <!-- ORACLE text -->
  <text x="256" y="80" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#ED1C24" letter-spacing="4">ORACLE</text>
  
  <!-- DATABASE text -->
  <text x="256" y="120" font-family="Arial, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="#000000" letter-spacing="6">DATABASE</text>
  
  <!-- Database icon on the right -->
  <g transform="translate(300, 140)">
    <!-- Cylinder body with red stripes -->
    <rect x="0" y="20" width="60" height="50" fill="none" stroke="#ED1C24" stroke-width="3"/>
    
    <!-- Top ellipse -->
    <ellipse cx="30" cy="20" rx="30" ry="12" fill="none" stroke="#ED1C24" stroke-width="3"/>
    <ellipse cx="30" cy="20" rx="30" ry="10" fill="#FFFFFF" stroke="#ED1C24" stroke-width="2"/>
    
    <!-- Horizontal stripes -->
    <line x1="0" y1="32" x2="60" y2="32" stroke="#ED1C24" stroke-width="2"/>
    <line x1="0" y1="44" x2="60" y2="44" stroke="#ED1C24" stroke-width="2"/>
    
    <!-- Bottom ellipse -->
    <ellipse cx="30" cy="70" rx="30" ry="12" fill="none" stroke="#ED1C24" stroke-width="3"/>
    
    <!-- Refresh icon -->
    <g transform="translate(55, 75)">
      <circle cx="0" cy="0" r="18" fill="#ED1C24"/>
      <path d="M -4 -8 Q 8 -12 12 0 Q 8 8 -4 8" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 4 8 Q -8 12 -12 0 Q -8 -8 4 -8" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
